ping:
  interval: "15m"
  count: 4
  timeout: "5s"
  privileged: true

storage:
  database: "./data/vpsping.db"
  log_file: "./logs/vpsping.log"
  json_output: "./output/results.json"

display:
  chart_width: 80
  chart_height: 20
  time_range: "24h"
