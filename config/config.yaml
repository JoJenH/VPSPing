vps:
  - name: "Dallas-TX"
    host: "198.23.249.100"
    enabled: true
  - name: "Chicago-IL"
    host: "198.23.228.15"
    enabled: true
  - name: "San-Jose-CA"
    host: "192.210.207.88"
    enabled: true
  - name: "New-York"
    host: "192.3.81.8"
    enabled: true
  - name: "Seattle"
    host: "192.3.253.2"
