version: '3.8'

services:
  vpsping:
    build:
      context: .
      args:
        - GOPROXY=${GOPROXY:-https://goproxy.cn,direct}
        - ALPINE_MIRROR=${ALPINE_MIRROR:-mirrors.aliyun.com}
    container_name: vpsping
    restart: unless-stopped
    privileged: true
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - vpsping-network

networks:
  vpsping-network:
    driver: bridge
